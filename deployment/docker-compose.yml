# EnterpriseKB Docker Compose
# 完整的服务编排配置

version: '3.8'

services:
  # ===== 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: enterprisekb-postgres
    environment:
      POSTGRES_DB: enterprisekb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprisekb-network

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: enterprisekb-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - enterprisekb-network

  # ===== Milvus =====
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: enterprisekb-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - enterprisekb-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: enterprisekb-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - enterprisekb-network

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: enterprisekb-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - enterprisekb-network

  # ===== Meilisearch =====
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: enterprisekb-meilisearch
    environment:
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - enterprisekb-network

  # ===== MinIO对象存储 =====
  minio-storage:
    image: minio/minio:latest
    container_name: enterprisekb-minio-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_storage_data:/data
    networks:
      - enterprisekb-network

  # ===== RabbitMQ =====
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: enterprisekb-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - enterprisekb-network

  # ===== Backend =====
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.backend
    container_name: enterprisekb-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/enterprisekb
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MEILISEARCH_URL=http://meilisearch:7700
      - MINIO_ENDPOINT=minio-storage:9000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      meilisearch:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - enterprisekb-network

  # ===== Frontend =====
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: enterprisekb-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - enterprisekb-network

  # ===== Nginx =====
  nginx:
    image: nginx:alpine
    container_name: enterprisekb-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - enterprisekb-network

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  meilisearch_data:
  minio_storage_data:
  rabbitmq_data:

networks:
  enterprisekb-network:
    driver: bridge
